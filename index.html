        :root {

            --js-blue: #0055b3;

            --js-red: #ef4444;
            --js-bg: #f0f4f8;

            --js-border: #dde3ec;
            --js-text: #1a2433;
            --js-muted: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--js-bg);
            color: var(--js-text);
            overflow: hidden;
            margin: 0;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== スクロールバー ===== */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c0cad8;
            border-radius: 99px;
        }

        .no-sb::-webkit-scrollbar {
            display: none;
        }

        .no-sb {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ===== アニメーション ===== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes pulse2 {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .4;
            }
        }

        .anim-fadeup {
            animation: fadeUp .3s ease both;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255, 255, 255, .25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        /* ===== カード ===== */
        .photo-card {
            background: var(--js-card);
            border: 1.5px solid var(--js-border);
            border-radius: 12px;
            transition: transform .15s, box-shadow .15s, border-color .15s;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 45, 110, .1);
            border-color: #a0b4cc;
        }

        .photo-card.selected {
            border-color: var(--js-blue);
            box-shadow: 0 0 0 3px rgba(0, 85, 179, .15);
            transform: translateY(-2px);
        }

        .photo-card.error-card {
            border-color: #f97316;
            background: #fffcf7;
        }

        .photo-card.error-card:hover {
            border-color: #ea580c;
        }

        /* ===== ボタン ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 12px;
            transition: all .15s;
            cursor: pointer;
            border: none;
            letter-spacing: .02em;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn-navy {
            background: var(--js-navy);
            color: #fff;
        }

        .btn-navy:hover {
            background: #001d4a;
        }

        .btn-blue {
            background: var(--js-blue);
            color: #fff;
        }

        .btn-blue:hover {
            background: #0044a0;
        }

        .btn-ghost {
            background: transparent;
            color: var(--js-muted);
            border: 1.5px solid var(--js-border);
        }

        .btn-ghost:hover {
            background: #f1f5f9;
            color: var(--js-text);
            border-color: #a0b4cc;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .btn-warn {
            background: #fef3c7;
            color: #b45309;
        }

        .btn-warn:hover {
            background: #fde68a;
        }

        .btn-green {
            background: #d1fae5;
            color: #065f46;
        }

        .btn-green:hover {
            background: #a7f3d0;
        }

        /* ===== フォーム ===== */
        .field-label {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--js-muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 4px;
            display: block;
        }

        .field-label.required::after {
            content: " *";
            color: var(--js-red);
        }

        .field-input {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid var(--js-border);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Noto Sans JP', sans-serif;
            outline: none;
            transition: border .15s, box-shadow .15s;
        }

        .field-input:focus {
            border-color: var(--js-blue);
            box-shadow: 0 0 0 3px rgba(0, 85, 179, .1);
            background: #fff;
        }

        .field-input.err {
            border-color: #f97316;
        }

        /* ===== ヘッダー ===== */
        .app-header {
            background: var(--js-navy);
            color: #fff;
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* ===== ステータスバー ===== */
        .status-bar {
            background: #0f1923;
            color: #94a3b8;
            padding: 0 20px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: .06em;
        }

        /* ===== バッジ ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .05em;
        }

        .badge-blue {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-green {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-orange {
            background: #ffedd5;
            color: #c2410c;
        }

        .badge-slate {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .badge-h30 {
            background: #fef9c3;
            color: #854d0e;
            border: 1px solid #fde68a;
        }

        .badge-r06 {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

            background: var(--js-border);

            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #92400e;
        }

        /* ===== ドロップゾーン ===== */
        .drop-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 45, 110, .12);
            border: 3px dashed var(--js-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* ===== 印刷 ===== */
        @media print {
            .no-print {
                display: none !important;
            }

            body {
                background: white !important;
                overflow: visible !important;
            }

            @page {
                size: A4 portrait;
                margin: 10mm;
            }

            .print-cover {
                page-break-after: always;
                padding: 20mm;
            }

            /* 写真台帳：1ページ2枚 */
            .ledger-page {
                width: 190mm;
                margin: 0 auto;
                page-break-after: always;
            }

            .ledger-item {
                display: flex;
                height: 92mm;
                border: 1px solid #444;
                margin-bottom: 5mm;
                page-break-inside: avoid;
            }

            .ledger-photo {
                width: 115mm;
                border-right: 1px solid #444;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 3mm;
                background: #f9f9f9;
            }

            .ledger-photo img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

            .ledger-meta {
                flex: 1;
                padding: 4mm;
                display: flex;
                flex-direction: column;
                gap: 2mm;
                font-size: 8.5pt;
            }

            .meta-row {
                border-bottom: .3mm solid #e0e0e0;
                padding-bottom: 1.5mm;
            }

            .meta-key {
                font-weight: 700;
                color: #555;
                font-size: 7.5pt;
                text-transform: uppercase;
                letter-spacing: .05em;
            }

            .meta-val {
                font-weight: 700;
                color: #111;
                font-size: 9pt;
                word-break: break-all;
            }

            .meta-serial {
                font-family: 'JetBrains Mono', monospace;
                font-size: 11pt;
                color: #002d6e;
                font-weight: 900;
            }
        }

        /* ===== トースト ===== */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            padding: 12px 20px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
            animation: fadeUp .3s ease both;
        }

        /* ===== ツールチップ ===== */
        [data-tip] {
            position: relative;
        }

        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f8fafc;
            padding: 4px 9px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
        }

        /* ===== XML自動保存 インジケータ ===== */
        .autosave-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--js-green);
            animation: pulse2 2s infinite;
        }

        select.field-input {
            appearance: none;

            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 14px;
            padding-right: 32px;
        }
    </style>

        /**
         * 全角→半角変換・制御文字除去
         * 出典: ZH005-00-24-A 6章 使用文字
         * 「全角の数字・ラテン文字は使用不可、数字やラテン文字は半角文字で統一」
         */
        const sanitizeForJS = (text) => {
            if (!text) return "";
            return String(text)
                .replace(/[０-９ａ-ｚＡ-Ｚ]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
                .replace(/[\x00-\x1F\x7F]/g, '')
                .slice(0, 255);
        };

        /** XML特殊文字エスケープ */
        const esc = (s) => {
            if (!s) return "";
            return String(s).replace(/[<>&"']/g, c => ({ "<": "&lt;", ">": `&gt;`, "&": "&amp;", '"': "&quot;", "'": "&apos;" }[c]));
        };

        /**
         * 撮影年月日フォーマット
         * JS要領正式: CCYY-MM-DD（ハイフン含む10桁固定）
         * 出典: ZH005-00-24-A 表5-1
         *   「CCYY-MM-DD方式で記入する。月又は日が1桁の数の場合0を付加して必ず10桁で記入」
         * ・UIはYYYY-MM-DD（date input）で入力→そのままXMLに出力
         * ・旧システム由来の YYYYMMDD（8桁、ハイフンなし）形式は読込時に変換
         * dateToXml / dateFromXml は同一変換なので共通化
         */
        const dateToXml = (d) => {
            if (!d) return "";
            if (/^\d{8}$/.test(d)) return `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
            return d;
        };
        const dateFromXml = dateToXml; // 変換ロジックが同一のためエイリアス

        /**
         * シリアル番号生成
         * 出典: ZH005-00-24-A 表5-1 シリアル番号欄
         *   「写真通し番号。123枚目を"000123"のように0を付けて記入してはいけない」
         *   データ表現: 半角数字　文字数: 7
         * ⚠️ ゼロ埋めなし・Pプレフィックスなし・純粋な半角数字のみ
         * 例: toSerial(1) → "1", toSerial(123) → "123"
         */
        const toSerial = (n) => String(Math.max(1, parseInt(n) || 1));

        /**
         * 写真ファイル名を生成
         * 出典: ZH005-00-24-A 表4-1 ファイル命名規則
         * H30系: P + 7桁英数字 + .JPG  （12文字固定）
         * R06系: P + 7桁英数字 + .XXXX （13文字以内、拡張子4文字以内）
         */
        const makeFileName = (n, stdId) => {
            const ext = STANDARDS[stdId]?.defaultExt || "JPG";
            return `P${String(n).padStart(7, '0')}.${ext}`;
        };

        /** ファイル名から番号部分を取り出す（例: P0000001.JPG → 1） */
        const parseFileNum = (name) => {
            const m = String(name || '').match(/^P(\d{7})\./i);
            return m ? parseInt(m[1]) : 0;
        };

        /**
         * 既存XMLのシリアル番号を正規化
         * 旧システムが「P0000001」「00000001」等で書いていた場合に対応
         */
        const parseSerialNum = (s) => {
            if (!s) return 0;
            return parseInt(String(s).replace(/^P0*/i, '').replace(/^0+/, '')) || 0;
        };

        /**
         * Date → "CCYY-MM-DD" 文字列変換
         * loadFolder / processDropFiles / handleMerge で共通使用
         */
        const dateToStr = (d) => {
            const dt = d instanceof Date ? d : new Date(d);
            return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
        };

        /**
         * EXIFから撮影日を取得して "CCYY-MM-DD" 文字列を返す
         * EXIFがない・読み取れない場合は "" を返す（lastModifiedフォールバックなし）
         * loadFolder / processDropFiles / handleMerge で共通使用
         */
        const readExifDate = async (file) => {
            try {
                if (!window.exifr) return "";
                const exifData = await window.exifr.parse(file);
                if (!exifData?.DateTimeOriginal) return "";
                let pd = exifData.DateTimeOriginal;
                if (typeof pd === 'string') pd = new Date(pd.replace(/^(\d{4}):(\d{2}):(\d{2})/, "$1-$2-$3"));
                return (pd instanceof Date && !isNaN(pd.getTime())) ? dateToStr(pd) : "";
            } catch { return ""; }
        };

        /**
         * workType文字列からdiscipline（工事種別）を逆引き
         * loadFolder / handleMerge で共通使用
         */
        const findDiscipline = (workType) => {
            if (!workType) return "";
            const m = WORK_MASTER.find(m => m.workTypes.some(w => w.name === workType));
            return m ? m.discipline : "";
        };

        /**
         * PHOTOフォルダハンドルを取得
         * rootHandle が PHOTO フォルダ自身の場合と親フォルダの場合の両方に対応
         * create=true の場合はフォルダが存在しなければ作成する
         * handleDelete / handleRename / handleMerge / processDropFiles 等で共通使用
         */
        const getPhotoDir = async (rootHandle, std, create = false) => {
            if (rootHandle.name === std.photoFolder) return rootHandle;
            return rootHandle.getDirectoryHandle(std.photoFolder, { create });
        };

        /**
         * PHOTO.XML の写真情報ノード群からxmlMapを構築
         * loadFolder / handleMerge で完全に同一のロジックが重複していたため共通化
         */
        const buildXmlMapFromNodes = (nodes) => {
            const map = {};
            for (let i = 0; i < nodes.length; i++) {
                const g = (tag) => nodes[i].getElementsByTagName(tag)[0]?.textContent?.trim() || "";
                const fn = g("写真ファイル名").toUpperCase();
                if (!fn) continue;
                const rawSerial = g("シリアル番号");
                const addInfoNode = nodes[i].getElementsByTagName("付加情報")[0];
                map[fn] = {
                    serialNo: rawSerial ? toSerial(parseSerialNum(rawSerial) || (i + 1)) : toSerial(i + 1),
                    category: g("写真区分"),
                    workType: g("工種"),
                    type: g("種別"),
                    subdivision: g("細別"),
                    title: g("写真タイトル"),
                    shootingDate: dateFromXml(g("撮影年月日")),
                    isRepresentative: g("代表写真") === "1",
                    isFrequency: g("提出頻度写真") === "1",
                    referenceFileName: addInfoNode?.getElementsByTagName("参考図ファイル名")[0]?.textContent?.trim() || "",
                    referenceTitle: addInfoNode?.getElementsByTagName("参考図タイトル")[0]?.textContent?.trim() || "",
                };
            }
            return map;
        };

        /**
         * Shift_JIS エンコード済み PHOTO.XML をバイト列として読み込み
         * DOMParser でパースして写真情報ノードを返す
         * loadFolder / handleMerge で共通使用
         */
        const readPhotoXmlNodes = async (photoDir) => {
            const xmlFile = await photoDir.getFileHandle('PHOTO.XML');
            const buf = await (await xmlFile.getFile()).arrayBuffer();
            const decoded = window.Encoding
                ? window.Encoding.codeToString(window.Encoding.convert(new Uint8Array(buf), 'UNICODE', 'AUTO'))
                : new TextDecoder('utf-8').decode(buf);
            return { decoded, nodes: new DOMParser().parseFromString(decoded, "text/xml").getElementsByTagName("写真情報") };
        };

         * handleRename / handleMerge で共通使用

        const CONCURRENCY_LIMIT = 15;

            for (let i = 0; i < tasks.length; i += CONCURRENCY_LIMIT) {
                await Promise.all(tasks.slice(i, i + CONCURRENCY_LIMIT).map(action));

        /**
         * バリデーション
         * 出典: ZH005-00-24-A 表5-1 必要度欄、表5-2/5-3 撮影工種区分の記入範囲
         *
         * 工種: 全写真区分・全工事種別で必須
         * 種別・細別:
         *   土木/建築系（表5-2）: 施工状況・品質管理・出来形管理は必須
         *   機械/電気系（表5-3）: 施工状況・機器製作・使用材料・品質管理・出来形管理は必須
         *                         着手前及び完成も△（条件付き）
         */
        const validatePhoto = (p) => {
            const errs = [];
            if (!p.title) errs.push("写真タイトル");
            if (!p.shootingDate) errs.push("撮影年月日");
            if (!p.category) errs.push("写真区分");
            if (!p.workType) errs.push("工種");

            const isMechElec = ["機械", "電気"].includes(p.discipline);
            // 種別・細別は同一条件で必須（出典: ZH005-00-24-A 表5-2/5-3）
            const needTypeSubdiv = isMechElec
                ? ["施工状況写真", "機器製作写真", "使用材料写真", "品質管理写真", "出来形管理写真", "着手前及び完成写真"].includes(p.category)
                : ["施工状況写真", "品質管理写真", "出来形管理写真"].includes(p.category);

            if (needTypeSubdiv && !p.type) errs.push("種別");
            if (needTypeSubdiv && !p.subdivision) errs.push("細別");

            // 参考図: 片方だけ入力はエラー
            // 出典: ZH005-00-24-A 表5-1「参考図ファイル名：条件付必須」「参考図タイトル：条件付必須」
            if (p.referenceFileName && !p.referenceTitle) errs.push("参考図タイトル");
            if (!p.referenceFileName && p.referenceTitle) errs.push("参考図ファイル名");
            return errs;
        };

        );

        /* ======================================================
           遅延読込み画像コンポーネント
           ====================================================== */
        const LazyImage = ({ file, className, forceLoad = false }) => {
            const [url, setUrl] = useState('');
            const ref = useRef(null);

            useEffect(() => {
                if (!file) return;
                let objUrl = '';
                if (forceLoad) {
                    objUrl = URL.createObjectURL(file);
                    setUrl(objUrl);
                    return () => URL.revokeObjectURL(objUrl);
                }
                const obs = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) {
                        objUrl = URL.createObjectURL(file);
                        setUrl(objUrl);
                        obs.disconnect();
                    }
                }, { rootMargin: '400px' });
                if (ref.current) obs.observe(ref.current);
                return () => { obs.disconnect(); if (objUrl) URL.revokeObjectURL(objUrl); };
            }, [file, forceLoad]);

            return <img ref={ref} src={url} className={className} />;
        };

        /* ======================================================
           XML生成関数
           出典: 国交省「デジタル写真管理情報基準R5.3月版」付属資料2 XML記入例
